
name: Namix Keep-Alive Pulse

on:
  schedule:
    # النبض كل 5 دقائق لضمان يقظة البوت وبث الإشارات
    - cron: '*/5 * * * *'
  workflow_dispatch: # يسمح بتشغيل النبضة يدوياً للتجربة

jobs:
  pulse:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Namix Pulse Engine
        run: |
          curl -s -X GET "https://${{ secrets.APP_DOMAIN }}/api/cron/broadcast" \
          -H "Content-Type: application/json"
